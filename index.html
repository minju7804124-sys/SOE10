<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoE! Portfolio</title>
  <style>
    *{box-sizing:border-box}
    html{scroll-behavior:smooth;scroll-snap-type:y mandatory;background:#000}
    body{margin:0;background:#000;color:#fff;overflow-x:hidden;font-family:Arial,Helvetica,sans-serif}
    a{text-decoration:none;color:inherit}
    .page{position:relative;width:100%;height:100vh;min-height:100vh;background:#000;display:flex;align-items:center;justify-content:center;scroll-snap-align:start;scroll-snap-stop:always;overflow:hidden}
    .frame{position:relative;width:100vw;height:100vh;background:#000;overflow:hidden}
    .media,.fallback{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000;display:block}
    .fallback{opacity:0;pointer-events:none;z-index:2}
    .page.ended .fallback{opacity:1}
    .page.ended .media{opacity:0}
    .overlay{position:fixed;inset:0;z-index:9999;pointer-events:none}
    .hotspot{position:absolute;display:block;background:transparent;pointer-events:auto;cursor:pointer;text-indent:-9999px;overflow:hidden}
    .hotspot:focus-visible{outline:1px solid rgba(255,255,255,.75);outline-offset:2px}
    @media (max-width:900px){html{scroll-snap-type:none}.page{min-height:auto;height:auto}.frame{width:100vw;height:calc(100vw * 9 / 16)}}
  </style>
</head>
<body>
  <main id="app"></main>
  <div class="overlay" id="overlay"></div>

  <script src="site-config.js"></script>
  <script>
    const PAGES = [
      { num:"1" },
      { num:"2" },
      { num:"3", watch:"film1" },
      { num:"4", watch:"animation1" },
      { num:"5", watch:"animation2" },
      { num:"6", watch:"commercial1" },
      { num:"7", watch:"commercial2" },
      { num:"8", watch:"commercial3" },
      { num:"9", watch:"works1" },
      { num:"10" },
      { num:"11" },
      { num:"12" },
      { num:"13" },
      { num:"14" }
    ];

    const TARGETS = {
      home:"#page-1",
      about:"#page-2",
      film:"#page-3",
      animation:"#page-4",
      commercial:"#page-6",
      works:"#page-9",
      contact:"#page-13"
    };

    const MENU_RECTS = {
      home:       {x:52.0,y:8.6,w:7.0,h:5.8},
      about:      {x:59.3,y:8.6,w:7.0,h:5.8},
      film:       {x:66.7,y:8.6,w:5.7,h:5.8},
      animation:  {x:72.7,y:8.6,w:9.8,h:5.8},
      commercial: {x:82.8,y:8.6,w:8.2,h:5.8},
      works:      {x:91.4,y:8.6,w:4.8,h:5.8},
      contact:    {x:96.4,y:8.6,w:3.3,h:5.8}
    };

    const WATCH_RECTS = {
      "3": { x: 86.0, y: 52.0, w: 13.0, h: 7.5 },
      "4": { x: 75.2, y: 80.0, w: 18.0, h: 8.5 },
      "5": { x: 75.5, y: 77.6, w: 18.0, h: 8.5 },
      "6": { x: 43.5, y: 77.2, w: 18.0, h: 8.5 },
      "7": { x: 43.5, y: 77.2, w: 18.0, h: 8.5 },
      "8": { x: 43.5, y: 77.2, w: 18.0, h: 8.5 },
      "9": { x: 82.0, y: 82.0, w: 13.0, h: 6.5 }
    };

    function youtubeLink(key){
      const link = (window.SOE_CONFIG && window.SOE_CONFIG.links && window.SOE_CONFIG.links[key]) || "https://www.youtube.com/";
      return /^https:\/\/(www\.)?(youtube\.com|youtu\.be)\//.test(link) ? link : "https://www.youtube.com/";
    }

    const app = document.getElementById("app");
    app.innerHTML = PAGES.map(page => `
      <section class="page" id="page-${page.num}" data-num="${page.num}">
        <div class="frame">
          <video class="media" playsinline muted preload="metadata" poster="assets/${page.num}.jpg">
            <source src="assets/${page.num}.mp4" type="video/mp4">
          </video>
          <img class="fallback" src="assets/${page.num}-end.jpg" alt="" aria-hidden="true">
        </div>
      </section>
    `).join("");

    const overlay = document.getElementById("overlay");
    function createHotspot(href, rect, label, options = {}){
      const a = document.createElement("a");
      a.className = "hotspot";
      a.href = href;
      a.textContent = label;
      if(options.newTab){ a.target = "_blank"; a.rel = "noopener noreferrer"; }
      if(options.targetPage){ a.dataset.targetPage = options.targetPage; }
      a.dataset.x = rect.x; a.dataset.y = rect.y; a.dataset.w = rect.w; a.dataset.h = rect.h; a.dataset.alignRight = rect.alignRight ? "1" : "0";
      return a;
    }

    function currentPageEl(){
      let best = null, bestRatio = -1;
      document.querySelectorAll('.page').forEach(p => {
        const r = p.getBoundingClientRect();
        const vh = window.innerHeight;
        const visible = Math.max(0, Math.min(r.bottom, vh) - Math.max(r.top, 0));
        const ratio = visible / Math.max(1, Math.min(vh, r.height));
        if(ratio > bestRatio){ bestRatio = ratio; best = p; }
      });
      return best || document.querySelector('.page');
    }

    function layoutOverlay(pageEl){
      const frame = pageEl.querySelector('.frame');
      const fw = frame.clientWidth, fh = frame.clientHeight;
      const mediaRatio = 16/9, frameRatio = fw/fh;
      let rw, rh, rx, ry;
      if(frameRatio > mediaRatio){ rh = fh; rw = rh * mediaRatio; rx = (fw - rw) / 2; ry = 0; }
      else { rw = fw; rh = rw / mediaRatio; rx = 0; ry = (fh - rh) / 2; }
      const rect = frame.getBoundingClientRect();

      overlay.querySelectorAll('.hotspot').forEach(el => {
        const x = parseFloat(el.dataset.x), y = parseFloat(el.dataset.y), w = parseFloat(el.dataset.w), h = parseFloat(el.dataset.h);
        const alignRight = el.dataset.alignRight === "1";
        const pxW = rw * (w / 100), pxH = rh * (h / 100);
        let pxX = rect.left + rx + rw * (x / 100);
        const pxY = rect.top + ry + rh * (y / 100);
        if(alignRight){ pxX = rect.left + rx + rw - pxW; }
        el.style.left = pxX + "px";
        el.style.top = pxY + "px";
        el.style.width = pxW + "px";
        el.style.height = pxH + "px";
      });
    }

    function rebuildOverlay(){
      const pageEl = currentPageEl();
      if(!pageEl) return;
      const num = pageEl.dataset.num;
      overlay.innerHTML = "";
      overlay.appendChild(createHotspot(TARGETS.home, MENU_RECTS.home, "HOME", { targetPage: "page-1" }));
      overlay.appendChild(createHotspot(TARGETS.about, MENU_RECTS.about, "ABOUT", { targetPage: "page-2" }));
      overlay.appendChild(createHotspot(TARGETS.film, MENU_RECTS.film, "FILM", { targetPage: "page-3" }));
      overlay.appendChild(createHotspot(TARGETS.animation, MENU_RECTS.animation, "ANIMATION", { targetPage: "page-4" }));
      overlay.appendChild(createHotspot(TARGETS.commercial, MENU_RECTS.commercial, "COMMERCIAL", { targetPage: "page-6" }));
      overlay.appendChild(createHotspot(TARGETS.works, MENU_RECTS.works, "WORKS", { targetPage: "page-9" }));
      overlay.appendChild(createHotspot(TARGETS.contact, MENU_RECTS.contact, "CONTACT", { targetPage: "page-13" }));

      const pageData = PAGES.find(p => p.num === num);
      if(pageData && pageData.watch && WATCH_RECTS[num]){
        overlay.appendChild(createHotspot(youtubeLink(pageData.watch), WATCH_RECTS[num], "WATCH FILM", { newTab: true }));
      }
      layoutOverlay(pageEl);
    }


    overlay.addEventListener('click', (event) => {
      const hotspot = event.target.closest('.hotspot');
      if(!hotspot) return;
      const targetPage = hotspot.dataset.targetPage;
      if(!targetPage) return;
      event.preventDefault();
      const targetEl = document.getElementById(targetPage);
      if(!targetEl) return;
      history.replaceState(null, '', `#${targetPage}`);
      targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    let rafId = null;
    function scheduleOverlay(){
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(rebuildOverlay);
    }

    window.addEventListener('load', scheduleOverlay);
    window.addEventListener('resize', scheduleOverlay);
    window.addEventListener('scroll', scheduleOverlay, { passive: true });

    const videos = Array.from(document.querySelectorAll('.media'));
    function resetAndPlay(video){
      const page = video.closest('.page');
      if(!page) return;
      page.classList.remove('ended');
      try { video.currentTime = 0; } catch(e) {}
      const p = video.play();
      if(p && typeof p.catch === 'function') p.catch(() => {});
    }
    function stopVideo(video){ video.pause(); }

    videos.forEach(video => {
      const page = video.closest('.page');
      if(!page) return;
      video.addEventListener('ended', () => page.classList.add('ended'));
      video.addEventListener('error', () => page.classList.add('ended'));
      video.addEventListener('loadedmetadata', scheduleOverlay);
    });

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const video = entry.target;
        if(entry.isIntersecting) resetAndPlay(video);
        else stopVideo(video);
      });
      scheduleOverlay();
    }, { threshold: 0.65 });

    videos.forEach(v => observer.observe(v));
  </script>
</body>
</html>
