<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoE! Portfolio</title>
  <style>
    *{box-sizing:border-box}
    html{scroll-behavior:smooth;scroll-snap-type:y mandatory;background:#000}
    body{margin:0;background:#000;color:#fff;overflow-x:hidden;font-family:Arial,Helvetica,sans-serif}
    button{font:inherit}
    .site-nav{position:fixed;top:26px;right:32px;z-index:30;display:flex;align-items:center;gap:8px}
    .nav-button{border:1px solid rgba(255,255,255,.45);background:rgba(0,0,0,.22);color:#fff;padding:8px 11px;min-height:40px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;text-transform:uppercase;letter-spacing:.08em;font-size:12px;line-height:1;backdrop-filter:blur(4px)}
    .nav-button:hover,.nav-button:focus-visible{background:rgba(255,255,255,.16);outline:1px solid rgba(255,255,255,.7);outline-offset:2px}
    .page{position:relative;width:100%;height:100vh;min-height:100vh;background:#000;display:flex;align-items:center;justify-content:center;scroll-snap-align:start;scroll-snap-stop:always;overflow:hidden}
    .frame{position:relative;width:100vw;height:100vh;background:#000;overflow:hidden}
    .media,.fallback{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000;display:block}
    .fallback{opacity:0;pointer-events:none;z-index:2}
    .page.ended .fallback{opacity:1}
    .page.ended .media{opacity:0}
    .page-ui{position:absolute;inset:0;z-index:10;pointer-events:none}
    .watch-film-button{position:absolute;pointer-events:auto;border:1px solid rgba(255,255,255,.55);background:rgba(0,0,0,.30);color:#fff;padding:12px 18px;min-width:180px;min-height:52px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;text-transform:uppercase;letter-spacing:.12em;font-size:14px;line-height:1;backdrop-filter:blur(4px)}
    .watch-film-button:hover,.watch-film-button:focus-visible{background:rgba(255,255,255,.16);outline:1px solid rgba(255,255,255,.75);outline-offset:2px}
    .watch-page-3{top:50.5%;right:2.8%}
    .watch-page-4,.watch-page-5{right:6.5%;bottom:9.5%}
    .watch-page-6,.watch-page-7,.watch-page-8{left:42.5%;bottom:9.5%}
    .watch-page-9{right:4.8%;bottom:8.2%}
    @media (max-width:1200px){.site-nav{top:16px;right:16px;gap:6px;flex-wrap:wrap;max-width:calc(100vw - 32px);justify-content:flex-end}.nav-button{font-size:11px;padding:7px 9px;min-height:36px}.watch-film-button{min-width:150px;min-height:46px;font-size:12px;padding:10px 14px}}
    @media (max-width:900px){html{scroll-snap-type:none}.page{min-height:auto;height:auto}.frame{width:100vw;height:calc(100vw * 9 / 16)}.site-nav{position:sticky;top:0;left:0;right:0;z-index:30;padding:10px 12px;background:rgba(0,0,0,.72)}.watch-film-button{min-width:132px;min-height:42px;padding:8px 12px}}
  </style>
</head>
<body>
  <nav class="site-nav" id="site-nav" aria-label="Portfolio sections"></nav>
  <main id="app"></main>

  <script src="site-config.js"></script>
  <script>
    const PAGES = [
      { num:"1" },
      { num:"2" },
      { num:"3", watch:"film1", watchClass:"watch-page-3" },
      { num:"4", watch:"animation1", watchClass:"watch-page-4" },
      { num:"5", watch:"animation2", watchClass:"watch-page-5" },
      { num:"6", watch:"commercial1", watchClass:"watch-page-6" },
      { num:"7", watch:"commercial2", watchClass:"watch-page-7" },
      { num:"8", watch:"commercial3", watchClass:"watch-page-8" },
      { num:"9", watch:"works1", watchClass:"watch-page-9" },
      { num:"10" },
      { num:"11" },
      { num:"12" },
      { num:"13" },
      { num:"14" }
    ];

    const NAV_ITEMS = [
      { key:"home", label:"HOME", targetId:"page-1", targetPage:"1" },
      { key:"about", label:"ABOUT", targetId:"page-2", targetPage:"2" },
      { key:"film", label:"FILM", targetId:"page-3", targetPage:"3" },
      { key:"animation", label:"ANIMATION", targetId:"page-4", targetPage:"4" },
      { key:"commercial", label:"COMMERCIAL", targetId:"page-6", targetPage:"6" },
      { key:"works", label:"WORKS", targetId:"page-9", targetPage:"9" },
      { key:"contact", label:"CONTACT", targetId:"page-13", targetPage:"13" }
    ];

    function youtubeLink(key){
      const link = (window.SOE_CONFIG && window.SOE_CONFIG.links && window.SOE_CONFIG.links[key]) || "https://www.youtube.com/";
      return /^https:\/\/(www\.)?(youtube\.com|youtu\.be)\//.test(link) ? link : "https://www.youtube.com/";
    }

    function renderNavigation(){
      const nav = document.getElementById('site-nav');
      nav.innerHTML = NAV_ITEMS.map(item => `
        <button
          type="button"
          class="nav-button"
          data-nav-key="${item.key}"
          data-target-id="${item.targetId}"
          data-target-page="${item.targetPage}"
        >${item.label}</button>
      `).join('');
    }

    function watchButtonMarkup(page){
      if(!page.watch) return '';
      return `
        <div class="page-ui">
          <button
            type="button"
            class="watch-film-button ${page.watchClass || ''}"
            data-watch-key="${page.watch}"
            data-watch-url="${youtubeLink(page.watch)}"
          >WATCH FILM</button>
        </div>
      `;
    }

    function renderPages(){
      const app = document.getElementById('app');
      app.innerHTML = PAGES.map(page => `
        <section class="page" id="page-${page.num}" data-page="${page.num}">
          <div class="frame">
            <video class="media" playsinline muted preload="metadata" poster="assets/${page.num}.jpg">
              <source src="assets/${page.num}.mp4" type="video/mp4">
            </video>
            <img class="fallback" src="assets/${page.num}-end.jpg" alt="" aria-hidden="true">
            ${watchButtonMarkup(page)}
          </div>
        </section>
      `).join('');
    }

    function goToPage(targetId, targetPage){
      const target = document.getElementById(targetId);
      if(!target) return;
      history.replaceState(null, '', `#page-${targetPage}`);
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    renderNavigation();
    renderPages();

    document.addEventListener('click', (event) => {
      const navButton = event.target.closest('.nav-button');
      if(navButton){
        event.preventDefault();
        goToPage(navButton.dataset.targetId, navButton.dataset.targetPage);
        return;
      }

      const watchButton = event.target.closest('.watch-film-button');
      if(watchButton){
        event.preventDefault();
        const url = watchButton.dataset.watchUrl || 'https://www.youtube.com/';
        window.open(url, '_blank', 'noopener,noreferrer');
      }
    });

    const videos = Array.from(document.querySelectorAll('.media'));
    function resetAndPlay(video){
      const page = video.closest('.page');
      if(!page) return;
      page.classList.remove('ended');
      try { video.currentTime = 0; } catch(e) {}
      const playAttempt = video.play();
      if(playAttempt && typeof playAttempt.catch === 'function') playAttempt.catch(() => {});
    }
    function stopVideo(video){ video.pause(); }

    videos.forEach(video => {
      const page = video.closest('.page');
      if(!page) return;
      video.addEventListener('ended', () => page.classList.add('ended'));
      video.addEventListener('error', () => page.classList.add('ended'));
    });

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const video = entry.target;
        if(entry.isIntersecting) resetAndPlay(video);
        else stopVideo(video);
      });
    }, { threshold: 0.65 });

    videos.forEach(video => observer.observe(video));
  </script>
</body>
</html>
